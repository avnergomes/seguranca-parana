name: Quarterly Data Update

on:
  schedule:
    - cron: "0 6 15 1,4,7,10 *"
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: "Rebuild all data from scratch"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download raw data
        run: python scripts/download_data.py --force

      - name: Preprocess data
        run: python scripts/preprocess_data.py

      - name: Show data freshness
        run: |
          echo "=== Raw data files ==="
          ls -lh data/ || echo "No raw data directory"
          echo "=== Processed JSON files ==="
          ls -lh dashboard/public/data/ || echo "No processed data directory"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard/public/data/
          git commit -m "chore: update quarterly crime data $(date +%Y-%m-%d)"
          git push
