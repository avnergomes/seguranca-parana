name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      # NOTE: This workflow does NOT download raw data.
      # Raw data is downloaded and committed by the quarterly data-pipeline workflow.
      # If raw data is missing (e.g. fresh clone without running data-pipeline first),
      # preprocessing will produce empty JSONs. Run data-pipeline manually to populate data/.
      - name: Run data preprocessing
        run: python scripts/preprocess_data.py

      - name: Install frontend dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build frontend
        working-directory: dashboard
        run: npm run build
        env:
          VITE_TRACKING_URL: ${{ secrets.VITE_TRACKING_URL }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dashboard/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
