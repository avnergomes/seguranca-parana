<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Painel interativo de indicadores de seguranca publica do estado do Parana. Dados abertos de criminalidade, violencia letal, crimes patrimoniais e mais." />
    <meta name="keywords" content="seguranca publica, parana, criminalidade, violencia, dados abertos, dashboard" />
    <meta name="author" content="Seguranca Parana" />
    <link rel="canonical" href="https://avnergomes.github.io/seguranca-parana/" />
    <meta property="og:title" content="Seguranca Parana - Dashboard de Seguranca Publica" />
    <meta property="og:description" content="Painel interativo de indicadores de seguranca publica do Parana" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://avnergomes.github.io/seguranca-parana/" />
    <meta property="og:image" content="https://avnergomes.github.io/seguranca-parana/og-image.png" />
    <meta property="og:locale" content="pt_BR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Seguranca Parana - Dashboard de Seguranca Publica" />
    <meta name="twitter:description" content="Painel interativo de indicadores de seguranca publica do Parana" />
    <meta name="twitter:image" content="https://avnergomes.github.io/seguranca-parana/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Seguranca Parana",
      "description": "Dashboard de indicadores de seguranca publica do estado do Parana",
      "url": "https://avnergomes.github.io/seguranca-parana/",
      "applicationCategory": "DataVisualization",
      "operatingSystem": "Web",
      "author": {
        "@type": "Organization",
        "name": "Seguranca Parana"
      },
      "about": {
        "@type": "Dataset",
        "name": "Indicadores de Seguranca Publica do Parana",
        "license": "https://creativecommons.org/licenses/by/4.0/",
        "spatialCoverage": "Parana, Brasil"
      }
    }
    </script>
  </head>
  <body class="bg-neutral-50 font-sans text-dark-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- LGPD Banner -->
    <div id="lgpd-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#26262a;color:#f5f5f7;padding:1rem 2rem;z-index:9999;font-size:0.875rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;">
      <p style="margin:0;">
        Este site utiliza apenas dados publicos agregados. Nenhum dado pessoal e coletado ou armazenado.
        Em conformidade com a <strong>LGPD (Lei 13.709/2018)</strong>, todos os indicadores sao baseados em
        estatisticas oficiais sem identificacao individual.
      </p>
      <button onclick="document.getElementById('lgpd-banner').style.display='none';localStorage.setItem('lgpd-accepted','true')" style="background:#ea580c;color:white;border:none;padding:0.5rem 1.5rem;border-radius:0.375rem;cursor:pointer;white-space:nowrap;font-weight:600;">
        Entendi
      </button>
    </div>
    <script>
      if (!localStorage.getItem('lgpd-accepted')) {
        document.getElementById('lgpd-banner').style.display = 'flex';
      }
    </script>

    <!-- Analytics -->
    <script>
      (function() {
        var trackingUrl = '%VITE_TRACKING_URL%';
        if (!trackingUrl || trackingUrl.includes('VITE_TRACKING_URL')) return;
        var key = 'dg_tracked_' + location.pathname;
        if (sessionStorage.getItem(key)) return;
        sessionStorage.setItem(key, '1');
        try {
          fetch(trackingUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
              origin: location.origin,
              page: location.pathname,
              referrer: document.referrer || 'direto',
              timestamp: new Date().toISOString(),
              screenWidth: screen.width,
              screenHeight: screen.height,
              language: navigator.language,
              isMobile: /Mobile|Android|iPhone/i.test(navigator.userAgent)
            }),
            keepalive: true
          }).catch(function() {});
        } catch(e) {}
      })();
    </script>
  </body>
</html>
